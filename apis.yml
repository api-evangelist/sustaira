aid: sustaira
name: Sustaira
description: |
  Sustaira is a modular, AI-powered sustainability and ESG application platform
  built on a low-code architecture in partnership with Mendix. Customers use
  Sustaira to run carbon accounting (Scope 1, 2, and 3), ESG disclosure and
  reporting aligned to CSRD, CDP, PCAF, and SASB, sustainability project and
  KPI tracking, supply chain data collection, and industry-specific
  sustainability workflows across construction, finance, logistics, healthcare,
  and other sectors. Integration into customer systems is handled through web
  services and APIs on the underlying Mendix platform, plus a marketplace of
  150+ sustainability accelerators. Sustaira does not publish a public,
  self-service developer API portal; integration access is delivered through
  customer enterprise contracts and partner programs.
