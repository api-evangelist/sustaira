apis:
  - aid: sustaira:platform
    name: Sustaira ESG App Platform
    description: |
      The Sustaira platform exposes its sustainability and ESG apps and data
      through web service and API integrations on the underlying Mendix
      low-code runtime. Custom integrations connect to CRMs, ERPs, PLM, HR, and
      industry-specific source systems so activity and reference data flows in
      without manual processing. There is no public developer portal; API
      access is provisioned through enterprise contracts and partner programs.
    humanURL: https://www.sustaira.com/
