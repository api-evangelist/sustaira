    features:
      - name: Carbon Accounting
        description: Scope 1, 2, and 3 emissions measurement and management.
      - name: ESG Disclosure and Reporting
        description: Reporting aligned to CSRD, CDP, PCAF, SASB, and other frameworks.
      - name: KPI and Project Tracking
        description: Manage sustainability initiatives, KPIs, and outcomes across the organization.
      - name: Supply Chain Data Collection
        description: Distribute, collect, and validate supplier and stakeholder data.
      - name: Industry App Library
        description: Pre-built apps for construction, finance, logistics, healthcare, and other sectors.
      - name: Low-Code Customization
        description: Extend and customize apps using Mendix low-code tooling.
      - name: Marketplace Accelerators
        description: 150+ sustainability accelerators available through the marketplace.
      - name: Enterprise Deployment
        description: Private cloud deployment, support, and integrations under the Enterprise tier.
    useCases:
      - name: Enterprise ESG Program
        description: Stand up a unified ESG and sustainability program across business units.
      - name: Regulatory Disclosure
        description: Produce CSRD, CDP, and PCAF disclosures from a single platform.
      - name: Industry Workflows
        description: Run sustainability workflows tailored to construction, finance, logistics, healthcare, and more.
      - name: Consulting Delivery
        description: Sustainability consultants deliver client engagements on top of Sustaira apps.
      - name: Custom App Development
        description: Build bespoke sustainability apps via Mendix integration.
    integrations:
